server:
  port: 8080
springdoc:
  swagger-ui:
    path: /swagger-ui.html
spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017
      database: rdv_manager_db
  profiles:
    active: debug
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  application:
    name: rdv_manager_api_1.0
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.grey.sytsas: DEBUG